<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiet Mint | Stop Accounting, Start Living</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Instrument+Serif:italic&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F5FAF8; }
        .serif { font-family: 'Instrument Serif', serif; }
        .glass { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isCanceled, setIsCanceled] = useState(false);
            const [status, setStatus] = useState("idle");

            const handleCancel = () => {
                setStatus("processing");
                setTimeout(() => {
                    setIsCanceled(true);
                    setStatus("done");
                }, 2500);
            };

            return (
                <div className="min-h-screen p-6 md:p-12 text-[#1A2E26] max-w-2xl mx-auto">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-12">
                        <div>
                            <p className="text-[10px] tracking-[0.3em] font-bold opacity-40 uppercase">Sanctuary Alpha</p>
                            <h1 className="text-3xl serif italic text-[#1A2E26]">Quiet Mint</h1>
                        </div>
                        <div className="w-10 h-10 bg-[#2D4F44] rounded-full flex items-center justify-center text-[#98FFD9]">🍃</div>
                    </header>

                    {/* AI Whisper */}
                    <div className="bg-[#2D4F44] text-[#F5FAF8] p-8 rounded-[2.5rem] shadow-2xl mb-12 relative overflow-hidden">
                        <p className="text-[10px] tracking-widest opacity-50 mb-4">THE WHISPER</p>
                        <p className="text-xl font-light leading-relaxed">
                            "Alex, I've swept your savings into the <span className="text-[#98FFD9] font-medium">Tokyo Vault</span>. You're 85% of the way there. No more accounting today—go live your life."
                        </p>
                    </div>

                    {/* The Hero Number */}
                    <div className="text-center mb-16">
                        <p className="text-[10px] tracking-[0.4em] opacity-40 uppercase mb-2">Safe to Spend</p>
                        <h2 className="text-8xl serif">$1,240<span className="text-3xl opacity-30">.50</span></h2>
                    </div>

                    {/* Subs Section */}
                    <div className="space-y-4">
                        <h3 className="text-[10px] font-bold tracking-widest opacity-30 uppercase ml-2">Active Flows</h3>
                        {!isCanceled ? (
                            <div className="glass p-6 rounded-[2rem] flex justify-between items-center transition-all">
                                <div>
                                    <h4 className="font-bold text-sm">MasterClass Premium</h4>
                                    <p className="text-[10px] opacity-40 uppercase">Target: $180/year</p>
                                </div>
                                <button 
                                    onClick={handleCancel}
                                    className="bg-[#1A2E26] text-white px-5 py-2 rounded-full text-[10px] font-bold hover:scale-105 transition-transform"
                                >
                                    {status === "processing" ? "HANDLING IT..." : "CANCEL FOR ME"}
                                </button>
                            </div>
                        ) : (
                            <div className="p-6 text-center italic opacity-40 text-sm">
                                "I've reclaimed that $180 for your Tokyo trip. It's done."
                            </div>
                        )}
                    </div>

                    {/* Floating Goal Tab */}
                    <div className="fixed bottom-10 left-6 right-6 max-w-md mx-auto glass p-4 rounded-full flex items-center justify-between px-8 shadow-xl">
                        <span className="text-xs font-bold tracking-tighter">TOKYO 2026</span>
                        <div className="flex items-center gap-3">
                            <div className="w-24 bg-[#DCE8E2] h-1 rounded-full overflow-hidden">
                                <div className="bg-[#2D4F44] h-full w-[85%]"></div>
                            </div>
                            <span className="text-[10px] font-bold opacity-40">85%</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
